source: >-
  Derived from openapi/google-sheets-openapi.yml operations. As of this round
  Google's official remote Workspace MCP servers (developers.google.com/workspace/
  guides/configure-mcp-servers) cover Gmail, Drive, Calendar, People and Chat —
  there is NO official Sheets-specific MCP server (Drive's server can edit Sheets
  files indirectly). Several community servers exist (e.g. github.com/freema/
  mcp-gsheets, github.com/distrihub/mcp-google-workspace). This is a candidate
  tool surface mapped 1:1 from the Sheets REST operations, not a published server.
server:
  name: google-sheets
  transport: http
official: false
notes: >-
  No first-party hosted Sheets MCP endpoint published. Watch
  developers.google.com/workspace/guides/configure-mcp-servers for a Sheets
  server; until then use Drive's Workspace MCP server or a community server.
