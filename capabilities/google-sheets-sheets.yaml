naftiko: 1.0.0-alpha2
info:
  label: Google Sheets API — Sheets
  description: 'Google Sheets API — Sheets. 1 operations. Lead operation: Google Sheets Copy a Sheet to Another Spreadsheet.
    Self-contained Naftiko capability covering one Google Sheets business surface.'
  tags:
  - Google Sheets
  - Sheets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GOOGLE_SHEETS_API_KEY: GOOGLE_SHEETS_API_KEY
capability:
  consumes:
  - type: http
    namespace: google-sheets-sheets
    baseUri: https://sheets.googleapis.com/v4
    description: Google Sheets API — Sheets business capability. Self-contained, no shared references.
    resources:
    - name: spreadsheets-spreadsheetId-sheets-sheetId}:copyTo
      path: /spreadsheets/{spreadsheetId}/sheets/{sheetId}:copyTo
      operations:
      - name: copysheet
        method: POST
        description: Google Sheets Copy a Sheet to Another Spreadsheet
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sheetId
          in: path
          type: integer
          description: The ID of the sheet to copy.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.GOOGLE_SHEETS_API_KEY}}'
  exposes:
  - type: rest
    namespace: google-sheets-sheets-rest
    port: 8080
    description: REST adapter for Google Sheets API — Sheets. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/spreadsheets/{spreadsheetid}/sheets/sheetid-copyto
      name: spreadsheets-spreadsheetid-sheets-sheetid-copyto
      description: REST surface for spreadsheets-spreadsheetId-sheets-sheetId}:copyTo.
      operations:
      - method: POST
        name: copysheet
        description: Google Sheets Copy a Sheet to Another Spreadsheet
        call: google-sheets-sheets.copysheet
        with:
          sheetId: rest.sheetId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: google-sheets-sheets-mcp
    port: 9090
    transport: http
    description: MCP adapter for Google Sheets API — Sheets. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: google-sheets-copy-sheet-another
      description: Google Sheets Copy a Sheet to Another Spreadsheet
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: google-sheets-sheets.copysheet
      with:
        sheetId: tools.sheetId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
